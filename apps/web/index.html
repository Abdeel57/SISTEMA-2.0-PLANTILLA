<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- maximum-scale=1 evita el auto-zoom de iOS al enfocar campos (el pellizco para
         ampliar sigue funcionando desde iOS 10); interactive-widget hace que el teclado
         de Android redimensione el contenido en vez de tapar los campos. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#2235F9" />
    <meta name="description" content="Aparta tus boletos, paga fácil y recibe tu boleto digital con QR." />
    <!-- Open Graph / vista previa al compartir (WhatsApp, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rifas" />
    <meta property="og:title" content="Rifas y sorteos" />
    <meta property="og:description" content="Aparta tus boletos, paga fácil y recibe tu boleto digital con QR." />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-default.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rifas" />
    <title>Rifas y sorteos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800;900&family=Archivo:wdth,wght@125,700..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
