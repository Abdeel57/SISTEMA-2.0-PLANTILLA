<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión — Sortea</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #fff; display: grid; place-items: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
      .card { max-width: 360px; }
      .logo { width: 72px; height: 72px; border-radius: 18px; background: #2751fb; display: grid; place-items: center; font-weight: 900; font-size: 40px; margin: 0 auto 20px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #94a3b8; line-height: 1.5; }
      button { margin-top: 20px; background: #2751fb; color: #fff; border: 0; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">S</div>
      <h1>Sin conexión</h1>
      <p>No pudimos conectarte a internet. Revisa tu conexión e inténtalo de nuevo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
