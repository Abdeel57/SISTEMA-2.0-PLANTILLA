<!doctype html>
<!-- Vista previa estática del BrandLoader de Sortea (mismo CSS que index.css). -->
<html lang="es">
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  .overlay {
    position: fixed; inset: 0; display: grid; place-items: center;
    background-color: #070b18;
    background-image: radial-gradient(620px circle at 50% 50%, rgba(34,53,249,0.16), transparent 65%);
    animation: brand-loader-in .35s ease-out both;
  }
  .logo-box { position: relative; height: 96px; width: 96px; display: grid; place-items: center; }
  .aura {
    position: absolute; inset: -28px; border-radius: 9999px;
    background-image: radial-gradient(closest-side, rgba(34,53,249,0.6), rgba(202,22,196,0.28) 58%, transparent 74%);
    filter: blur(16px);
    animation: brand-aura 2.6s ease-in-out infinite;
  }
  .logo-box img {
    position: relative; height: 100%; width: 100%; object-fit: contain; opacity: .95;
    animation: brand-breathe 2.6s ease-in-out infinite;
  }
  @keyframes brand-shine { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  @keyframes brand-aura { 0%,100% { opacity:.4; transform:scale(.9); } 50% { opacity:.75; transform:scale(1.08); } }
  @keyframes brand-breathe { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
  @keyframes brand-loader-in { from { opacity:0; } to { opacity:1; } }
  .brand-loader-shine {
    position: absolute; inset: 0;
    background-image: linear-gradient(115deg, transparent 38%, rgba(65,120,255,0.55) 45%, rgba(255,255,255,0.98) 50%, rgba(202,22,196,0.55) 55%, transparent 62%);
    background-size: 200% 100%; background-repeat: no-repeat;
    animation: brand-shine 2.1s ease-in-out infinite;
    -webkit-mask-image: url('../apps/web/src/assets/sortea-icon-white.png');
    -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
    mask-image: url('../apps/web/src/assets/sortea-icon-white.png');
    mask-size: contain; mask-repeat: no-repeat; mask-position: center;
  }
</style>
</head>
<body>
  <div class="overlay">
    <div class="logo-box">
      <div class="aura"></div>
      <img src="../apps/web/src/assets/sortea-icon-white.png" alt="" />
      <div class="brand-loader-shine"></div>
    </div>
  </div>
</body>
</html>
